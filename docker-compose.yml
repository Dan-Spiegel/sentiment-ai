services:
  api:
    build:
      context: .
      target: runtime
    image: ghcr.io/dan-spiegel/sentiment-ai:latest
    container_name: sentiment-ai
    ports:
      - "8000:8000"
    networks:
      - cicd-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

networks:
  cicd-network:
    external: true
